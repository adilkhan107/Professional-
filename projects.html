<header>

<section class="projects" style="padding: 2rem 10%;">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem;">
        <h1>My Projects</h1>
        <div style="display:flex; gap:0.5rem; align-items:center">
            <input id="projectSearch" placeholder="Search projects..." style="padding:0.5rem; border:1px solid #ddd; border-radius:6px" />
            <select id="techFilter" style="padding:0.5rem; border:1px solid #ddd; border-radius:6px">
                <option value="">All technologies</option>
            </select>
            <select id="typeFilter" style="padding:0.5rem; border:1px solid #ddd; border-radius:6px">
                <option value="">All types</option>
                <option value="ml">Machine Learning</option>
                <option value="cv">Computer Vision</option>
                <option value="ds">Data Science</option>
                <option value="nlp">NLP</option>
                <option value="web">Web / Demo</option>
            </select>
        </div>
    </div>

    <div id="projectsList" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1rem; margin-top:1rem"></div>
</section>
